<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Ilustración: ciberseguridad para PYMES, escudo con verificación">
  <defs>
    <radialGradient id="bg" cx="70%" cy="8%" r="120%">
      <stop offset="0%" stop-color="#1e1e24"/>
      <stop offset="55%" stop-color="#0e0e11"/>
      <stop offset="100%" stop-color="#08080a"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- 7 gigante tenue -->
  <text x="880" y="440" font-family="ui-monospace, Menlo, monospace" font-size="340" font-weight="bold" fill="#ffffff" fill-opacity="0.05">7</text>

  <!-- Escudo -->
  <g transform="translate(600,300)">
    <path d="M0 -140 L120 -96 V6 C120 96 62 150 0 176 C-62 150 -120 96 -120 6 V-96 Z"
          fill="#16161b" stroke="#ffffff" stroke-opacity="0.8" stroke-width="3"/>
    <path d="M0 -140 L120 -96 V6 C120 96 62 150 0 176 C-62 150 -120 96 -120 6 V-96 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="14"/>
    <!-- check -->
    <path d="M-46 4 L-12 42 L58 -44" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="72" y="530" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#ffffff" fill-opacity="0.32">SECURITY · SMB</text>
</svg>
