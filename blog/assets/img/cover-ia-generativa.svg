<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Ilustración: red neuronal de IA generativa">
  <defs>
    <radialGradient id="bg" cx="30%" cy="6%" r="120%">
      <stop offset="0%" stop-color="#2a2a32"/>
      <stop offset="55%" stop-color="#0e0e11"/>
      <stop offset="100%" stop-color="#08080a"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- Red neuronal: 4 capas -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.4">
    <!-- capa 1 -> 2 -->
    <line x1="360" y1="180" x2="540" y2="150"/><line x1="360" y1="180" x2="540" y2="300"/><line x1="360" y1="180" x2="540" y2="450"/>
    <line x1="360" y1="300" x2="540" y2="150"/><line x1="360" y1="300" x2="540" y2="300"/><line x1="360" y1="300" x2="540" y2="450"/>
    <line x1="360" y1="420" x2="540" y2="150"/><line x1="360" y1="420" x2="540" y2="300"/><line x1="360" y1="420" x2="540" y2="450"/>
    <!-- capa 2 -> 3 -->
    <line x1="540" y1="150" x2="720" y2="210"/><line x1="540" y1="150" x2="720" y2="390"/>
    <line x1="540" y1="300" x2="720" y2="210"/><line x1="540" y1="300" x2="720" y2="390"/>
    <line x1="540" y1="450" x2="720" y2="210"/><line x1="540" y1="450" x2="720" y2="390"/>
    <!-- capa 3 -> 4 -->
    <line x1="720" y1="210" x2="880" y2="300"/><line x1="720" y1="390" x2="880" y2="300"/>
  </g>
  <g fill="#0e0e11" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2">
    <circle cx="360" cy="180" r="14"/><circle cx="360" cy="300" r="14"/><circle cx="360" cy="420" r="14"/>
    <circle cx="540" cy="150" r="14"/><circle cx="540" cy="300" r="14"/><circle cx="540" cy="450" r="14"/>
    <circle cx="720" cy="210" r="14"/><circle cx="720" cy="390" r="14"/>
  </g>
  <circle cx="880" cy="300" r="22" fill="#16161b" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5"/>
  <circle cx="880" cy="300" r="34" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

  <text x="72" y="520" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#ffffff" fill-opacity="0.32">GENERATIVE · AI</text>
</svg>
