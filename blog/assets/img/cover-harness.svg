<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Ilustración: harness de IA y agentes autónomos">
  <defs>
    <radialGradient id="bg" cx="50%" cy="2%" r="120%">
      <stop offset="0%" stop-color="#2b2b34"/>
      <stop offset="55%" stop-color="#0e0e11"/>
      <stop offset="100%" stop-color="#08080a"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- Brackets del harness -->
  <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M410 170 h-46 v260 h46"/>
    <path d="M790 170 h46 v260 h46"/>
  </g>

  <!-- Nodos-herramienta orbitando el núcleo (modelo) -->
  <g stroke="#ffffff" stroke-opacity="0.16" stroke-width="1.6">
    <line x1="600" y1="300" x2="470" y2="205"/>
    <line x1="600" y1="300" x2="470" y2="395"/>
    <line x1="600" y1="300" x2="730" y2="205"/>
    <line x1="600" y1="300" x2="730" y2="395"/>
    <line x1="600" y1="300" x2="600" y2="160"/>
    <line x1="600" y1="300" x2="600" y2="440"/>
  </g>
  <g fill="#0e0e11" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2">
    <circle cx="470" cy="205" r="15"/>
    <circle cx="470" cy="395" r="15"/>
    <circle cx="730" cy="205" r="15"/>
    <circle cx="730" cy="395" r="15"/>
    <circle cx="600" cy="160" r="15"/>
    <circle cx="600" cy="440" r="15"/>
  </g>

  <!-- Núcleo (LLM) -->
  <circle cx="600" cy="300" r="52" fill="#16161b" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5"/>
  <circle cx="600" cy="300" r="52" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="16"/>
  <text x="600" y="308" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="26" fill="#ffffff" fill-opacity="0.9">LLM</text>

  <text x="72" y="520" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#ffffff" fill-opacity="0.32">AI · HARNESS · AGENTS</text>
</svg>
