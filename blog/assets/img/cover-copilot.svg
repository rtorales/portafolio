  <!-- Burbuja de chat -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.5">
    <path d="M470 210 h260 a26 26 0 0 1 26 26 v128 a26 26 0 0 1 -26 26 h-150 l-58 46 v-46 h-52 a26 26 0 0 1 -26 -26 v-128 a26 26 0 0 1 26 -26 z"/>
