    <line x1="510" y1="262" x2="690" y2="262"/>
    <line x1="510" y1="300" x2="650" y2="300"/>
  </g>

  <!-- Spark / estrella IA -->
  <g fill="#ffffff" fill-opacity="0.9">
    <path d="M770 180 l14 40 40 14 -40 14 -14 40 -14 -40 -40 -14 40 -14 z"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.4">
    <path d="M700 350 l8 22 22 8 -22 8 -8 22 -8 -22 -22 -8 22 -8 z"/>
  </g>

  <text x="72" y="520" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#ffffff" fill-opacity="0.32">AI · COPILOT</text>
