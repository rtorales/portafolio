<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Ilustración: la carrera acelerada de los modelos de IA en 2026">
  <defs>
    <radialGradient id="bg" cx="30%" cy="4%" r="120%">
      <stop offset="0%" stop-color="#2b2b34"/>
      <stop offset="55%" stop-color="#0e0e11"/>
      <stop offset="100%" stop-color="#08080a"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ffffff" fill-opacity="0.85"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- Barras ascendentes (índice de inteligencia que sube) -->
  <g>
    <rect x="300" y="410" width="60" height="90"  rx="6" fill="#ffffff" fill-opacity="0.14"/>
    <rect x="384" y="360" width="60" height="140" rx="6" fill="#ffffff" fill-opacity="0.20"/>
    <rect x="468" y="300" width="60" height="200" rx="6" fill="#ffffff" fill-opacity="0.28"/>
    <rect x="552" y="250" width="60" height="250" rx="6" fill="#ffffff" fill-opacity="0.42"/>
    <rect x="636" y="205" width="60" height="295" rx="6" fill="#ffffff" fill-opacity="0.62"/>
    <rect x="720" y="150" width="60" height="350" rx="6" fill="#ffffff" fill-opacity="0.9"/>
  </g>

  <!-- Línea de tendencia acelerada -->
  <path d="M330 430 C 480 400, 560 300, 660 235 S 780 150, 820 118"
        fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3" marker-end="url(#arr)"/>
  <circle cx="330" cy="430" r="5" fill="#ffffff" fill-opacity="0.8"/>
  <circle cx="498" cy="322" r="5" fill="#ffffff" fill-opacity="0.8"/>
  <circle cx="666" cy="232" r="5" fill="#ffffff" fill-opacity="0.8"/>

  <text x="72" y="120" font-family="ui-monospace, Menlo, monospace" font-size="34" letter-spacing="2" fill="#ffffff" fill-opacity="0.92">2026</text>
  <text x="72" y="530" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#ffffff" fill-opacity="0.32">AI · FRONTIER · RACE</text>
</svg>
