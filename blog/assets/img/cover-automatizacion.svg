<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Ilustración: automatización de procesos, flujo de nodos">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#2d2d36"/>
      <stop offset="55%" stop-color="#0e0e11"/>
      <stop offset="100%" stop-color="#08080a"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ffffff" fill-opacity="0.5"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- Pipeline de flujo -->
  <g stroke="#ffffff" stroke-opacity="0.4" stroke-width="2.5" fill="none">
    <line x1="332" y1="300" x2="452" y2="300" marker-end="url(#arrow)"/>
    <line x1="548" y1="300" x2="668" y2="220" marker-end="url(#arrow)"/>
    <line x1="548" y1="300" x2="668" y2="380" marker-end="url(#arrow)"/>
    <line x1="764" y1="220" x2="864" y2="300" marker-end="url(#arrow)"/>
    <line x1="764" y1="380" x2="864" y2="300" marker-end="url(#arrow)"/>
  </g>

  <!-- Nodos del flujo -->
  <g fill="#16161b" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2.5">
    <rect x="252" y="264" width="72" height="72" rx="14"/>
    <rect x="474" y="264" width="72" height="72" rx="14"/>
    <circle cx="716" cy="220" r="30"/>
    <circle cx="716" cy="380" r="30"/>
    <rect x="872" y="264" width="72" height="72" rx="14"/>
  </g>
  <!-- engranaje simple en el nodo final -->
  <g transform="translate(908,300)" stroke="#ffffff" stroke-opacity="0.8" stroke-width="3" fill="none">
    <circle r="12"/>
    <g stroke-linecap="round">
      <line x1="0" y1="-20" x2="0" y2="-14"/><line x1="0" y1="14" x2="0" y2="20"/>
      <line x1="-20" y1="0" x2="-14" y2="0"/><line x1="14" y1="0" x2="20" y2="0"/>
    </g>
  </g>

  <text x="72" y="530" font-family="ui-monospace, Menlo, monospace" font-size="22" letter-spacing="6" fill="#ffffff" fill-opacity="0.32">AUTOMATION · FLOW</text>
</svg>
