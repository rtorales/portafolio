<!-- @dsCard group="Components" viewport="700x620" name="Profile — Stats, Skills, Timeline, Contact" subtitle="Portfolio building blocks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 24px; color: var(--text-body); }
  .block { margin-bottom: 24px; }
  .h { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .statrow { display: flex; background: var(--surface-card); border: 1px solid var(--border-default); border-radius: 12px; padding: 20px 0; }
  .statrow > * { flex: 1; border-right: 1px solid var(--border-default); }
  .statrow > *:last-child { border-right: none; }
  .dark { background: var(--gradient-hero); border-radius: 12px; padding: 20px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { StatItem, SkillCard, TimelineItem, ContactCard, LangBar, Avatar } = window.RicardoToralesBrandSystem_e0aacc;
    const ico = (d) => <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d={d}/></svg>;
    const mail = <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>;
    function Demo() {
      return (
        <>
          <div className="block">
            <p className="h">StatItem</p>
            <div className="statrow">
              <StatItem value="14" suffix="+" label="Años" />
              <StatItem value="9" suffix="+" label="Certificaciones" />
              <StatItem value="2" label="Maestrías" />
            </div>
          </div>
          <div className="block">
            <p className="h">SkillCard + Avatar</p>
            <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
              <SkillCard style={{flex:1}} title="Gestión de Proyectos" icon={ico("M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2")} skills={['PMBOK','ITIL','SCRUM','Lean Six Sigma']} />
              <Avatar src="../../assets/ricardo-torales.jpeg" alt="RT" size={120} />
            </div>
          </div>
          <div className="block">
            <p className="h">TimelineItem</p>
            <div style={{position:'relative',paddingLeft:32}}>
              <div style={{position:'absolute',left:9,top:8,bottom:20,width:2,background:'linear-gradient(to bottom,var(--navy-800),var(--border-default))'}}></div>
              <TimelineItem current company="Grupo Chacomer" role="Gerente de Proyectos de Tecnología" period="2026 – Actualidad" context="Grupo empresarial líder en Paraguay" bullets={['Dirección estratégica de la transformación digital.','Gobierno de proyectos de alto valor.']} />
            </div>
          </div>
          <div className="block">
            <p className="h">ContactCard (on dark) + LangBar</p>
            <div className="dark" style={{marginBottom:14}}>
              <ContactCard icon={mail} href="#">ricardotorales@outlook.com</ContactCard>
            </div>
            <div style={{background:'var(--surface-card)',border:'1px solid var(--border-default)',borderRadius:12,padding:16,display:'flex',flexDirection:'column',gap:12}}>
              <LangBar name="Español" level="Nativo" value={100} />
              <LangBar name="Inglés" level="Intermedio" value={60} />
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
