<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark & Monogram" subtitle="RT monogram + name lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 26px 30px; display: flex; align-items: center; gap: 34px; }
  .mono { width: 64px; height: 64px; border-radius: 14px; background: var(--ink-900); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: -1.5px; }
  .word { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; color: var(--color-brand); letter-spacing: -.03em; }
  .word span { color: var(--zinc-400); }
  .sub { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="mono">RT</div>
  <div>
    <div class="word">Ricardo <span>Torales</span></div>
    <div class="sub">Gerente de Tecnología · Consultor en Automatización</div>
  </div>
</body>
</html>
