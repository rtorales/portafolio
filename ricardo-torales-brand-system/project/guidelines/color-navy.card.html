<!-- @dsCard group="Colors" viewport="700x150" name="Ink · Dark Surfaces" subtitle="Near-black family — hero, portfolio, contact bands" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; gap: 0; }
  .sw { flex: 1; height: 150px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 14px; color: #fff; }
  .name { font-size: .72rem; font-weight: 700; letter-spacing: .04em; }
  .hex { font-family: var(--font-mono); font-size: .68rem; opacity: .8; margin-top: 2px; }
  .tok { font-family: var(--font-mono); font-size: .62rem; opacity: .65; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-950)"><span class="name">Ink 950</span><span class="hex">#08080A</span><span class="tok">--ink-950 · brand-strong</span></div>
    <div class="sw" style="background:var(--ink-900)"><span class="name">Ink 900</span><span class="hex">#0E0E11</span><span class="tok">--ink-900 · brand ★</span></div>
    <div class="sw" style="background:var(--ink-850)"><span class="name">Ink 850</span><span class="hex">#141418</span><span class="tok">--ink-850</span></div>
    <div class="sw" style="background:var(--ink-800)"><span class="name">Ink 800</span><span class="hex">#1B1B20</span><span class="tok">--ink-800 · brand-soft</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="name">Ink 700</span><span class="hex">#26262D</span><span class="tok">--ink-700</span></div>
  </div>
</body>
</html>
