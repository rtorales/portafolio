<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="6 chip · 8 button · 12 card · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 20px 24px; }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 78px; height: 60px; background: var(--surface-page); border: 1.5px solid var(--color-brand); }
  .lbl { font-family: var(--font-mono); font-size: .6rem; color: var(--text-muted); text-align:center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 4</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 6<br>chip</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 8<br>button</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 12<br>card</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill); width:110px"></div><span class="lbl">pill · 100</span></div>
  </div>
</body>
</html>
