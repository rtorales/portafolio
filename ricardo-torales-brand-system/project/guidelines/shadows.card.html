<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Soft cool elevation — sm / md / lg" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); padding: 26px 30px; }
  .row { display: flex; gap: 30px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 150px; height: 74px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-default); }
  .lbl { font-family: var(--font-mono); font-size: .62rem; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">--shadow-sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">--shadow-md · hover</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">--shadow-lg</span></div>
  </div>
</body>
</html>
