<!-- @dsCard group="Colors" viewport="700x150" name="Status & Gold" subtitle="Success, distinction, informational tints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); padding: 18px 20px; }
  .grid { display: flex; gap: 14px; flex-wrap: wrap; }
  .chip { display: flex; flex-direction: column; gap: 8px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .lbl { font-family: var(--font-mono); font-size: .6rem; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="chip">
      <span class="pill" style="background:var(--success-100); color:var(--success-600); border:1px solid var(--success-300)"><span class="dot" style="background:var(--success-400)"></span>Activo</span>
      <span class="lbl">--success-*</span>
    </div>
    <div class="chip">
      <span class="pill" style="background:var(--gold-100); color:var(--gold-700); border:1px solid var(--gold-200)">Becado</span>
      <span class="lbl">--gold-*</span>
    </div>
    <div class="chip">
      <span class="pill" style="background:var(--info-100); color:var(--accent-600); border:1px solid var(--info-200)">2026 – Actualidad</span>
      <span class="lbl">--info-* / accent</span>
    </div>
    <div class="chip">
      <span class="pill" style="background:var(--surface-subtle); color:var(--text-muted); border:1px solid var(--border-default)">Neutral</span>
      <span class="lbl">--surface-subtle</span>
    </div>
  </div>
</body>
</html>
